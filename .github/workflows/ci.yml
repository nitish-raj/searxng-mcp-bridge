name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Lint GitHub Actions workflows
      uses: rhysd/actionlint@v1.7.11

  test:
    runs-on: ubuntu-latest
    needs: workflow-lint

    steps:
    - uses: actions/checkout@v6
    
    - name: Use Node.js 25.x
      uses: actions/setup-node@v6
      with:
        node-version: '25.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build project
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-node-25
        path: build/
        retention-days: 7

  validate-package:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '25.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build project
      run: npm run build
    
    - name: Pack package
      run: npm pack --json > pack-output.json
    
    - name: List package contents
      run: |
        TARBALL="$(node -p 'require("./pack-output.json")[0].filename')"
        tar -tvf "$TARBALL"

    - name: Validate packaged tarball in a clean install
      run: |
        TARBALL="$(node -p 'require("./pack-output.json")[0].filename')"
        TMPDIR="$(mktemp -d)"
        PACKAGE_NAME="$(node -p 'require("./package.json").name')"
        PACKAGE_VERSION="$(node -p 'require("./package.json").version')"
        PACKAGE_BIN="$(node -p 'Object.values(require("./package.json").bin)[0]')"

        pushd "$TMPDIR" >/dev/null
        npm init -y >/dev/null 2>&1
        npm install --ignore-scripts "${GITHUB_WORKSPACE}/${TARBALL}" >/dev/null

        PACKAGE_NAME="$PACKAGE_NAME" PACKAGE_VERSION="$PACKAGE_VERSION" PACKAGE_BIN="$PACKAGE_BIN" node - <<'NODE'
        const fs = require('fs');
        const path = require('path');

        const packageRoot = path.join(process.cwd(), 'node_modules', ...process.env.PACKAGE_NAME.split('/'));
        const installedPackage = JSON.parse(fs.readFileSync(path.join(packageRoot, 'package.json'), 'utf8'));
        const binPath = path.join(packageRoot, process.env.PACKAGE_BIN);

        if (installedPackage.version !== process.env.PACKAGE_VERSION) {
          throw new Error(`Expected version ${process.env.PACKAGE_VERSION}, got ${installedPackage.version}`);
        }

        fs.accessSync(binPath, fs.constants.F_OK);
        console.log(`Validated packaged install for ${process.env.PACKAGE_NAME}@${installedPackage.version}`);
        NODE
        popd >/dev/null
    
    - name: Upload package artifact
      uses: actions/upload-artifact@v6
      with:
        name: npm-package
        path: |
          *.tgz
          pack-output.json
        retention-days: 7
