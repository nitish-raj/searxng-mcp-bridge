name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Lint GitHub Actions workflows
      uses: rhysd/actionlint@v1.7.11

  test:
    runs-on: ubuntu-latest
    needs: workflow-lint
    
    strategy:
      matrix:
        node-version: [25.x]
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build project
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-${{ matrix.node-version }}
        path: build/
        retention-days: 7

  validate-package:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '25.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build project
      run: npm run build
    
    - name: Pack package
      run: npm pack
    
    - name: List package contents
      run: tar -tvf ./*.tgz

    - name: Check whether version is already published
      id: npm_version
      run: |
        PACKAGE_NAME="$(node -p 'require("./package.json").name')"
        PACKAGE_VERSION="$(node -p 'require("./package.json").version')"

        if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "Version ${PACKAGE_VERSION} is already published on npm."
        else
          echo "published=false" >> "$GITHUB_OUTPUT"
          echo "Version ${PACKAGE_VERSION} is not published yet."
        fi
    
    - name: Validate package with dry-run publish
      if: steps.npm_version.outputs.published != 'true'
      run: npm publish --dry-run

    - name: Skip dry-run publish for existing version
      if: steps.npm_version.outputs.published == 'true'
      run: echo "Skipping npm publish --dry-run because this package version already exists on npm."
    
    - name: Upload package artifact
      uses: actions/upload-artifact@v6
      with:
        name: npm-package
        path: "*.tgz"
        retention-days: 7
