name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name != 'release' }}
    name: Prepare Release
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.x'
          cache: 'npm'

      - name: Run release-please release-pr
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npx --yes release-please@17.3.0 release-pr \
            --token="$RELEASE_PLEASE_TOKEN" \
            --repo-url="$GITHUB_REPOSITORY" \
            --target-branch="$TARGET_BRANCH" \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json

      - name: Enable auto-merge for release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          PRS="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --search "is:open is:pr label:\"autorelease: pending\" base:${TARGET_BRANCH}" \
            --json number \
            --jq '.[].number')"

          if [ -z "$PRS" ]; then
            echo "No PRs found. Skipping auto-merge."
            exit 0
          fi

          for PR_NUMBER in $PRS; do
            echo "Enabling auto-merge for PR #$PR_NUMBER"
            gh pr merge --auto --squash --repo "$GITHUB_REPOSITORY" "$PR_NUMBER"
          done

      - name: Run release-please github-release
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npx --yes release-please@17.3.0 github-release \
            --token="$RELEASE_PLEASE_TOKEN" \
            --repo-url="$GITHUB_REPOSITORY" \
            --target-branch="$TARGET_BRANCH" \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json

  publish:
    name: Publish Package
    if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Update npm
        run: npm i -g npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate release version
        run: |
          VERSION="${RELEASE_TAG#v}"

          PKG_VERSION="$(node -p 'require("./package.json").version')"

          if [[ "$VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Release version ($VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

          echo "✅ Version consistency check passed"

      - name: Publish to npm with trusted publishing (OIDC)
        id: publish_with_oidc
        continue-on-error: true
        run: npm publish

      - name: Publish to npm with token fallback
        id: publish_with_token
        if: ${{ steps.publish_with_oidc.outcome == 'failure' && env.NPM_TOKEN != '' }}
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Fail if publish did not succeed
        if: ${{ steps.publish_with_oidc.outcome == 'failure' && steps.publish_with_token.outcome != 'success' }}
        run: |
          echo "::error::npm publish failed. Configure trusted publishing (OIDC) or provide a valid granular NPM_TOKEN with write permissions."
          exit 1

      - name: Create package tarball
        run: npm pack

      - name: Upload package to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${RELEASE_TAG}" ./*.tgz --clobber
